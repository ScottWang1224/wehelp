<!DOCTYPE html>
<html lang="en">
<head>

    <title>My Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">

        <section class="bars">

                <img src="img.png" alt="Promotion image">

            <div class="bar bar-wide">

                <img src="img.png" alt="Promotion image">

            </div>
        </section>
        <section class="cards">
            <div class="card">
                <img class="card-bg" src="img.png" alt="Scenery">
                <img class="star" src="star.png" alt="Star">
                <div class="card-title">Title 1</div>

            <div class="card">

                <img class="star" src="star.png" alt="Star">

            </div>

            <div class="card">
                <img class="card-bg" src="img.png" alt="Scenery">
                <img class="star" src="star.png" alt="Star">
                <div class="card-title">Title 4</div>
            </div>

            <div class="card">
                <img class="card-bg" src="img.png" alt="Scenery">

            </div>

            <div class="card">

                <img class="star" src="star.png" alt="Star">
                <div class="card-title">Title 6</div>
            </div>

            <div class="card">

            <div class="card">

            <div class="card">

                <img class="star" src="star.png" alt="Star">
                <div class="card-title">Title 9</div>
            </div>

            <div class="card">

                <img class="star" src="star.png" alt="Star">

        </section>
    </main>

    <aside class="mobile-menu">
        <button class="close-menu">×</button>
        <a href="#">Item 1</a>
        <a href="#">Item 2</a>
        <a href="#">Item 3</a>
        <a href="#">Item 4</a>
    </aside>

    <script>
    const burgerMenu = document.querySelector(".burger-menu");
    const mobileMenu = document.querySelector(".mobile-menu");
    const closeMenu = document.querySelector(".close-menu");

    burgerMenu.addEventListener("click", function () {
        mobileMenu.classList.add("active");
    });

    closeMenu.addEventListener("click", function () {
        mobileMenu.classList.remove("active");
    });
    </script>
</body>
</html>
