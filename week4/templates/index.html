<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <title>歡迎光臨</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <header class="header">歡迎光臨，請輸入信箱密碼</header>

    <main class="content">
      <div class="container">
        <h1>登入系統</h1>

        <form action="/login" method="post" onsubmit="return checkAgreement();">
          <div class="form-row">
            <label for="email">信箱</label>
            <input id="email" type="text" name="email" />
          </div>

          <div class="form-row">
            <label for="password">密碼</label>
            <input id="password" type="password" name="password" />
          </div>

          <div class="checkbox-row">
            <label for="agree">同意條款</label>
            <input type="checkbox" id="agree" />
          </div>

          <button type="submit">登入</button>
        </form>

        <section class="hotel-section">
          <h1>取得旅館資訊</h1>

          <div class="form-row">
            <label for="hotel-id">編號</label>
            <input id="hotel-id" type="text" />
          </div>

          <button type="button" onclick="getHotelInfo()">取得</button>
        </section>
      </div>
    </main>

    <script>
      function checkAgreement() {
        const checkbox = document.getElementById("agree");

        if (!checkbox.checked) {
          alert("請勾選同意條款");
          return false;
        }

        return true;
      }

      function getHotelInfo() {
        const hotelId = document.getElementById("hotel-id").value;

        if (!/^[1-9][0-9]*$/.test(hotelId)) {
          alert("請輸入正整數");
          return;
        }

        window.location.href = "/hotel/" + hotelId;
      }
    </script>
  </body>
</html>
