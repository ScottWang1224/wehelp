<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>會員頁</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>

  <body>
    <header class="header">
      <h1>歡迎光臨，這是會員頁</h1>
    </header>

    <main class="container">
      <section class="section">
        <p>{{ member.name }}，歡迎登入系統</p>
        <a href="/logout">登出系統</a>
      </section>

      <section class="section">
        <h2>MCP 伺服器設定</h2>

        <p>
          請使用
          <span>http://127.0.0.1:3000/mcp/</span>
          網址
          <br />
          點擊產生Token取得金鑰
        </p>

        <button id="generate-token-button" type="button">產生Token</button>

        <div class="token-area">
          <p id="token-result">尚未產生 Token</p>
        </div>
      </section>

      <section class="section">
        <h2>快來留言吧</h2>

        <form id="message-form">
          <div class="form-row">
            <label for="message-content">內容</label>
            <input id="message-content" type="text" />
          </div>

          <button type="submit">送出</button>
        </form>
      </section>

      <section class="section">
        <div id="message-list"></div>
      </section>
    </main>

    <script src="/static/script.js?v=4"></script>

    <script>
      const generateTokenButton = document.querySelector(
        "#generate-token-button",
      );

      const tokenResult = document.querySelector("#token-result");

      generateTokenButton.addEventListener("click", async function () {
        generateTokenButton.disabled = true;
        tokenResult.textContent = "產生中...";

        try {
          const response = await fetch("http://127.0.0.1:3000/api/token", {
            method: "PUT",
            credentials: "include",
          });

          const data = await response.json();

          if (data.ok) {
            tokenResult.textContent = data.token;
          } else {
            tokenResult.textContent = "Token 產生失敗";
          }
        } catch (error) {
          console.error("Generate token error:", error);
          tokenResult.textContent = "無法連線到 Token API";
        } finally {
          generateTokenButton.disabled = false;
        }
      });
    </script>
  </body>
</html>
